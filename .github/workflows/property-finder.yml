name: 搵屋爬蟲 / Property Finder

on:
  schedule:
    # 每 1 小時跑一次, 用 :27 而唔用 :00 — GitHub 喺整點最繁忙, 成日會延遲/跳過排程。
    - cron: "27 * * * *"
  workflow_dispatch: {}   # 都可以喺 Actions 頁面手動㩒一下試

permissions:
  contents: write   # 用嚟將 seen.json 寫返去, 避免重複匯報

concurrency:
  group: property-finder
  cancel-in-progress: false

jobs:
  find:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/property-scraper-telegram-bot-zqy2vm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 裝 Scrapling 隱身瀏覽器 (破反爬蟲)
        run: |
          python3 -m pip install --upgrade pip
          pip install "scrapling[fetchers]"
          # 下載隱身瀏覽器 (camoufox) + 需要嘅系統庫
          scrapling install || python3 -m camoufox fetch || true

      - name: 跑搵屋爬蟲
        env:
          # token 可以放喺 secret TELEGRAM_BOT_TOKEN 或者簡寫 TG (兩個名都讀)
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN || secrets.TG }}
          # chat id: 可以留空, 程式會自動偵測 (你要先同 bot 講過一句嘢);
          # 想穩陣就加 secret TELEGRAM_CHAT_ID 或者 TG_CHAT_ID
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || secrets.TG_CHAT_ID }}
          USE_STEALTH: "1"     # 用隱身瀏覽器
          DEBUG: "1"           # 印出每個來源攞到幾多 (調試用, 之後可以收返)
          DUMP_DIR: "html_dump"  # 存低 rendered HTML 做 artifact (寫 parser 用)
        run: python3 -m property_finder.finder

      - name: 上載 rendered HTML (調試用)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: html-dump
          path: html_dump/
          if-no-files-found: ignore
          retention-days: 3

      - name: 記住已匯報嘅盤 (commit seen.json)
        run: |
          git config user.name "property-finder-bot"
          git config user.email "actions@github.com"
          git add property_finder/state/seen.json
          if git diff --cached --quiet; then
            echo "seen.json 冇變, 唔使 commit"
          else
            git commit -m "chore: update seen listings [skip ci]"
            git push
          fi
