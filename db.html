function apply(){
  const nm=$('f_name').value.trim(), jk=$('f_jockey').value, di=$('f_dist').value,
        cl=$('f_class').value, tk=$('f_track').value, od=$('f_odds').value;
  let lo=0,hi=9999; if(od){ [lo,hi]=od.split('-').map(Number); }
  const f = RUNS.filter(r=>{
    if(nm && !String(r['馬名']).includes(nm)) return false;
    if(jk && r['騎師']!==jk) return false;
    if(di && r['距離']!==di) return false;
    if(cl && r['班次']!==cl) return false;
    if(tk && r['跑道']!==tk) return false;
    if(od){ const o=parseFloat(r['獨贏']); if(isNaN(o)||o<lo||o>hi) return false; }
    return true;
  });
  renderStats(f); renderRows(f);
}
function renderStats(f){
  const n=f.length;
  const t3=f.filter(r=>toInt(r['名次'])<=3).length;
  const w=f.filter(r=>toInt(r['名次'])===1).length;
  const odds=f.map(r=>parseFloat(r['獨贏'])).filter(x=>!isNaN(x));
  const avg=odds.length?(odds.reduce((a,b)=>a+b,0)/odds.length):0;
  const S=$('stats'); S.replaceChildren();
  const cards=[['符合場數',n,''],['入三甲率',n?(t3/n*100).toFixed(1)+'%':'—','hl'],
    ['冠軍率',n?(w/n*100).toFixed(1)+'%':'—','hl'],['平均獨贏',avg?avg.toFixed(1):'—','']];
  cards.forEach(([l,v,c])=>{const d=document.createElement('div');d.className='stat '+c;
    const vv=document.createElement('div');vv.className='v';vv.textContent=v;
    const ll=document.createElement('div');ll.className='l';ll.textContent=l;
    d.appendChild(vv);d.appendChild(ll);S.appendChild(d);});
  // 名次分佈
  const b1=f.filter(r=>toInt(r['名次'])<=3).length, b2=f.filter(r=>{const p=toInt(r['名次']);return p>=4&&p<=6}).length, b3=n-b1-b2;
  const D=$('dist'); D.replaceChildren();
  D.appendChild(document.createTextNode('名次分佈：'));
  [['前3',b1,'#3fb950'],['4-6',b2,'#58a6ff'],['7+',b3,'#6e7681']].forEach(([l,c,col])=>{
    const sp=document.createElement('span');const bar=document.createElement('span');bar.className='bar';
    bar.style.background=col;bar.style.width=(n?c/n*200:0)+'px';
    sp.appendChild(bar);sp.appendChild(document.createTextNode(` ${l}:${c} `));D.appendChild(sp);});
}
function renderRows(f){
  const T=$('rows'); T.replaceChildren();
  f.slice(0,400).forEach(r=>{
    const tr=document.createElement('tr');
    const p=toInt(r['名次']);
    [['馬名',r['馬名']],['日期',r['日期']],['距離',r['距離']],['跑道',r['跑道']],['場地',r['場地']],
     ['班次',r['班次']],['檔',r['檔']],['名次',r['名次']],['騎師',r['騎師']],['負磅',r['負磅']],['獨贏',r['獨贏']]].forEach(([k,v],i)=>{
      const td=document.createElement('td');td.textContent=v==null?'':v;
      if(i===7){ if(p===1)td.className='p1'; else if(p<=3)td.className='p23'; }
      tr.appendChild(td);});
    T.appendChild(tr);});
}
['f_name','f_jockey','f_dist','f_class','f_track','f_odds'].forEach(id=>{
  $(id).addEventListener('input',apply); $(id).addEventListener('change',apply);});
apply();
</script>
</body></html>
